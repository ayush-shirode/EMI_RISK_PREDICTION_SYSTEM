version: '3.8'

services:
  # --- STEP 2: Kafka Infrastructure ---
  zookeeper:
    image: bitnamilegacy/zookeeper:3.8
    container_name: zookeeper
    restart: unless-stopped
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_HEAP_SIZE=256
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    networks:
      - emi-network
    mem_limit: 384m
    mem_reservation: 256m

  kafka:
    image: bitnamilegacy/kafka:3.5
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=536870912
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
      - ./infra/kafka/kafka-setup.sh:/docker-entrypoint-initdb.d/kafka-setup.sh
    ports:
      - "9092:9092"
    networks:
      - emi-network
    mem_limit: 768m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-init:
    image: bitnamilegacy/kafka:3.5
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic raw-transactions --config retention.ms=604800000 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic balance-updates --config retention.ms=259200000 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic risk-alerts --config retention.ms=2592000000 &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic processed-events --config retention.ms=604800000 &&
        echo 'All topics created successfully'
      "
    networks:
      - emi-network
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=emi-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    ports:
      - "8080:8080"
    networks:
      - emi-network
    mem_limit: 256m

  # --- STEP 1: Plaid Ingestion ---
  plaid-ingestion:
    build: ./services/plaid-ingestion
    container_name: plaid-ingestion
    restart: unless-stopped
    environment:
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=sandbox
      - PLAID_ACCESS_TOKEN=${PLAID_ACCESS_TOKEN}
      - KAFKA_BROKER=kafka:9092
      - NODE_OPTIONS=--max-old-space-size=256
    ports:
      - "3001:3001"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - emi-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xmx1g -Xms512m
      - bootstrap.memory_lock=true
      - "cluster.routing.allocation.disk.threshold_enabled=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - emi-network
    mem_limit: 1.5g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v red"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "5601:5601"
    volumes:
      - ./infra/elasticsearch/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      - emi-network
    mem_limit: 768m
    mem_reservation: 512m

  es-init:
    build: ./infra/elasticsearch/init
    container_name: es-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
    networks:
      - emi-network
    restart: on-failure

  logstash:
    build: ./infra/logstash
    container_name: logstash
    restart: unless-stopped
    environment:
      - KAFKA_BROKER=kafka:9092
      - ES_HOST=elasticsearch:9200
      - LS_JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - emi-network
    mem_limit: 768m
    mem_reservation: 512m
    volumes:
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./infra/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro

volumes:
  zookeeper_data:
    driver: local
  kafka_data:
    driver: local
  es_data:
    driver: local

networks:
  emi-network:
    driver: bridge
