version: '3.8'

# ============================================================
# Early Warning Credit Risk & EMI Stress Prediction System
# RAM Budget (16 GB machine):
#   Zookeeper:     384 MB
#   Kafka:         768 MB
#   Kafka UI:      256 MB
#   Elasticsearch: 1536 MB
#   Kibana:        768 MB
#   Logstash:      768 MB
#   Ollama:        4096 MB  ← largest, CPU-only
#   MongoDB:       512 MB
#   Mongo Express: 128 MB
#   AI Engine:     512 MB
#   Plaid Ingest:  256 MB
#   Dashboard:     768 MB
#   Scheduler:     256 MB
#   ES Init:       ephemeral
#   Kafka Init:    ephemeral
#   TOTAL PEAK:   ~11.5 GB (leaves ~4.5 GB for OS + swap)
# ============================================================

services:

  # ── STEP 2: Kafka Infrastructure ──────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: zookeeper
    restart: unless-stopped
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_HEAP_SIZE=256
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    networks:
      - emi-network
    mem_limit: 384m
    mem_reservation: 256m

  kafka:
    image: bitnami/kafka:3.5
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms256m
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9092:9092"
    networks:
      - emi-network
    mem_limit: 768m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kafka-init:
    image: bitnami/kafka:3.5
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic raw-transactions &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic balance-updates &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic risk-alerts &&
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic processed-events &&
        echo 'Topics created'
      "
    networks:
      - emi-network
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=emi-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8080:8080"
    networks:
      - emi-network
    mem_limit: 256m

  # ── STEP 4: Elasticsearch Stack ───────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xmx1g -Xms512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - emi-network
    mem_limit: 1536m
    mem_reservation: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -v red"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "5601:5601"
    networks:
      - emi-network
    mem_limit: 768m

  es-init:
    build: ./infra/elasticsearch/init
    container_name: es-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_URL=http://elasticsearch:9200
    networks:
      - emi-network
    restart: on-failure

  # ── STEP 3: Logstash ──────────────────────────────────────
  logstash:
    build: ./infra/logstash
    container_name: logstash
    restart: unless-stopped
    environment:
      - KAFKA_BROKER=kafka:9092
      - ES_HOST=elasticsearch:9200
      - LS_JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - emi-network
    mem_limit: 768m

  # ── STEP 7: MongoDB ───────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=emi_system
    volumes:
      - mongo_data:/data/db
      - ./infra/mongodb/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "27018:27017"
    networks:
      - emi-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH=false
    ports:
      - "8081:8081"
    networks:
      - emi-network
    mem_limit: 128m

  # ── STEP 5: Ollama + AI Engine ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - emi-network
    mem_limit: 4g
    mem_reservation: 2g

  ai-engine:
    build: ./services/ai-engine
    container_name: ai-engine
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - ES_URL=http://elasticsearch:9200
      - KAFKA_BROKER=kafka:9092
      - MONGO_URI=mongodb://mongodb:27017/emi_system
      - NODE_OPTIONS=--max-old-space-size=256
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - emi-network
    mem_limit: 512m

  # ── STEP 1: Plaid Ingestion ───────────────────────────────
  plaid-ingestion:
    build: ./services/plaid-ingestion
    container_name: plaid-ingestion
    restart: unless-stopped
    environment:
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=sandbox
      - PLAID_ACCESS_TOKEN=${PLAID_ACCESS_TOKEN}
      - KAFKA_BROKER=kafka:9092
      - NODE_OPTIONS=--max-old-space-size=256
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - emi-network
    mem_limit: 256m

  # ── STEP 6: Dashboard ─────────────────────────────────────
  dashboard:
    build: ./services/dashboard
    container_name: dashboard
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/emi_system
      - AI_ENGINE_URL=http://ai-engine:3002
      - NODE_OPTIONS=--max-old-space-size=512
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      ai-engine:
        condition: service_started
    networks:
      - emi-network
    mem_limit: 768m

  # ── STEP 8: Scheduler ─────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: ./services/scheduler/Dockerfile
    container_name: scheduler
    restart: unless-stopped
    environment:
      - AI_ENGINE_URL=http://ai-engine:3002
      - MONGO_URI=mongodb://mongodb:27017/emi_system
      - ALERT_EMAIL=${ALERT_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - DASHBOARD_URL=http://localhost:3000
      - DEFAULT_EMI_AMOUNT=${DEFAULT_EMI_AMOUNT:-15000}
      - RUN_ON_START=${RUN_ON_START:-false}
      - NODE_OPTIONS=--max-old-space-size=256
    depends_on:
      mongodb:
        condition: service_healthy
      ai-engine:
        condition: service_started
    networks:
      - emi-network
    mem_limit: 256m

# ── Volumes ──────────────────────────────────────────────────
volumes:
  zookeeper_data:
  kafka_data:
  es_data:
  mongo_data:
  ollama_models:

# ── Network ───────────────────────────────────────────────────
networks:
  emi-network:
    driver: bridge
