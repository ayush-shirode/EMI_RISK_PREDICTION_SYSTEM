input {
  dead_letter_queue {
    path => "/usr/share/logstash/data/dead_letter_queue"
    commit_offsets => true
    pipeline_id => "main"
  }
}

filter {
  mutate {
    add_field => { "dlq_ingested_at" => "%{[@timestamp]}" }
  }
}

output {
  stdout {
    codec => rubydebug { metadata => true }
  }
  elasticsearch {
    hosts => ["${ES_HOST:elasticsearch:9200}"]
    index => "logstash-dlq-%{+YYYY.MM.dd}"
    action => "index"
  }
}
