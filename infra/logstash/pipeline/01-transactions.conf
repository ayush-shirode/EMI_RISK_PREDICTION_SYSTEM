input {
  kafka {
    bootstrap_servers => "${KAFKA_BROKER:kafka:9092}"
    topics => ["raw-transactions"]
    group_id => "logstash-transactions"
    codec => json
    auto_offset_reset => "earliest"
    consumer_threads => 2
  }
}

filter {
  # Parse the envelope
  if [eventType] == "transaction.batch" {
    split {
      field => "[payload][transactions]"
      target => "payload"
    }

    mutate {
      rename => {
        "[payload][transaction_id]" => "transaction_id"
        "[payload][amount]"         => "amount"
        "[payload][date]"           => "transaction_date"
        "[payload][name]"           => "merchant_name"
        "[payload][category]"       => "category"
        "[payload][account_id]"     => "account_id"
      }
      add_field => {
        "user_id"       => "%{[userId]}"
        "ingested_at"   => "%{[@timestamp]}"
        "data_source"   => "plaid_sandbox"
      }
    }

    # Normalise amount to always be positive for spend
    ruby {
      code => "
        amt = event.get('amount').to_f
        event.set('spend_amount', amt.abs)
        event.set('is_debit', amt > 0)
        event.set('month_key', event.get('transaction_date').to_s[0..6])
      "
    }

    # Categorise spend type
    mutate {
      add_field => { "spend_category_primary" => "%{[category][0]}" }
    }

    date {
      match => ["transaction_date", "yyyy-MM-dd"]
      target => "transaction_ts"
    }
  }

  # Remove original nested payload
  mutate {
    remove_field => ["payload", "source", "eventType", "@version", "headers"]
  }
}

output {
  elasticsearch {
    hosts => ["${ES_HOST:elasticsearch:9200}"]
    index => "transactions-%{month_key}"
    document_id => "%{transaction_id}"
    action => "index"
  }
}
