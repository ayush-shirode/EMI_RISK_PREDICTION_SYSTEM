input {
  kafka {
    bootstrap_servers => "${KAFKA_BROKER:kafka:9092}"
    topics => ["balance-updates"]
    group_id => "logstash-balances"
    codec => json
    auto_offset_reset => "earliest"
    consumer_threads => 1
  }
}

filter {
  ruby {
    code => "
      accounts = event.get('[payload][accounts]') || []
      accounts.each do |acc|
        bal     = acc['balances'] || {}
        current = bal['current'].to_f
        avail   = bal['available'].to_f
        limit   = bal['limit'].to_f

        # Utilisation ratio (for credit accounts)
        if limit > 0
          acc['utilisation_pct'] = ((current / limit) * 100).round(2)
        end

        # Buffer days: how many days can spending continue at current rate
        acc['balance_buffer_days'] = avail > 0 ? (avail / 200).round(1) : 0
      end
      event.set('accounts_enriched', accounts)
    "
  }

  mutate {
    add_field => {
      "user_id"     => "%{[userId]}"
      "snapshot_at" => "%{[@timestamp]}"
    }
    remove_field => ["payload", "source", "eventType", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["${ES_HOST:elasticsearch:9200}"]
    index => "balances-%{+YYYY-MM}"
    action => "index"
  }
}
